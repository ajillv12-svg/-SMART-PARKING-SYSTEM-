<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Parking System</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:700px;
      background:#1e293b;
      padding:30px;
      border-radius:15px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#38bdf8;
    }

    .card-container{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:#334155;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }

    .card h2{
      font-size:20px;
      margin-bottom:10px;
      color:#facc15;
    }

    .value{
      font-size:32px;
      font-weight:bold;
    }

    .available{
      color:#22c55e;
    }

    .occupied{
      color:#ef4444;
    }

    .status{
      color:#38bdf8;
    }

    .log-box{
      background:black;
      color:#00ff00;
      padding:15px;
      height:180px;
      overflow-y:auto;
      border-radius:10px;
      font-family:monospace;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0284c7;
    }

    footer{
      margin-top:20px;
      text-align:center;
      color:#94a3b8;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>🚗 Smart Parking System</h1>

    <div class="card-container">

      <div class="card">
        <h2>Occupied</h2>
        <div class="value occupied" id="occupied">0</div>
      </div>

      <div class="card">
        <h2>Available</h2>
        <div class="value available" id="available">10</div>
      </div>

      <div class="card">
        <h2>Status</h2>
        <div class="value status" id="status">AVAILABLE</div>
      </div>

    </div>

    <div class="log-box" id="logs">
      System Started...
    </div>

    <button onclick="simulateMotion()">
      Simulate Motion
    </button>

    <footer>
      Developed By AJIL
    </footer>

  </div>

  <script>

    let occupied = 0;
    let totalSlots = 10;

    function simulateMotion(){

      if(occupied < totalSlots){
        occupied++;
      }

      let available = totalSlots - occupied;

      document.getElementById("occupied").innerText = occupied;
      document.getElementById("available").innerText = available;

      if(available === 0){

        document.getElementById("status").innerText = "FULL";
        document.getElementById("status").style.color = "red";

      }else{

        document.getElementById("status").innerText = "AVAILABLE";
        document.getElementById("status").style.color = "#22c55e";
      }

      let logs = document.getElementById("logs");

      logs.innerHTML += `
        <br>
        MOTION DETECTED <br>
        OCCUPIED:${occupied} <br>
        AVAILABLE:${available} <br>
        STATUS:${available===0 ? "FULL":"AVAILABLE"} <br>
        -------------------------
      `;

      logs.scrollTop = logs.scrollHeight;
    }

  </script>

</body>
</html>
